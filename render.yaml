services:
  - type: web
    name: miniature-asmr-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: HF_TOKEN
        sync: false
    plan: starter
